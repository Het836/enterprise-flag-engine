version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flag_engine_postgres
    environment:
      POSTGRES_DB: flag_engine
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flag_engine_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  prometheus:
    image: prom/prometheus:latest
    container_name: flag_engine_prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: flag_engine_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

# This block right here tells Docker to create the persistent storage space for your DB
volumes:
  postgres_data: