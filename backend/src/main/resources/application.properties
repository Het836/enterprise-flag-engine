spring.application.name=backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5439/flag_engine
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Engine Toggle
spring.flyway.enabled=true

# Distributed Redis Connection Profile
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.jpa.open-in-view=false
# ==========================================
# Resilience4j Circuit Breaker Config
# ==========================================
# We name our breaker "redisCache"
resilience4j.circuitbreaker.instances.redisCache.sliding-window-size=5
resilience4j.circuitbreaker.instances.redisCache.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redisCache.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.redisCache.permitted-number-of-calls-in-half-open-state=2

# Expose the endpoints via HTTP
management.endpoints.web.exposure.include=health,metrics,prometheus

# Enable Caffeine cache metrics instrumentation
management.metrics.cache.instrument=true

# Publish the percentile histogram buckets for your P99 latency target
management.metrics.distribution.percentiles-histogram.flag.evaluations.latency=true