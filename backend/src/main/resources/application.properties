spring.application.name=backend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/flag_engine
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Engine Toggle
spring.flyway.enabled=true

# Distributed Redis Connection Profile
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ==========================================
# Resilience4j Circuit Breaker Config
# ==========================================
# We name our breaker "redisCache"
resilience4j.circuitbreaker.instances.redisCache.sliding-window-size=5
resilience4j.circuitbreaker.instances.redisCache.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.redisCache.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.redisCache.permitted-number-of-calls-in-half-open-state=2